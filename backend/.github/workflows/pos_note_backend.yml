name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Pull latest code on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /var/www
            if [ -d "pos_node_back_office" ]; then
              cd pos_node_back_office
              git fetch --all
              git reset --hard origin/main
            else
              git clone https://github.com/titya18/pos_node_back_office.git
            fi

      - name: Build and deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 25m
          script: |
            cd /var/www/pos_node_back_office
            docker compose -f /var/www/docker-compose.backend.yml build backend
            docker compose -f /var/www/docker-compose.backend.yml up -d --no-deps backend
