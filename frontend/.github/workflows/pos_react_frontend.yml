name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Pull latest code on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /var/www
            if [ -d "pos_react_front_office" ]; then
              cd pos_react_front_office
              git fetch --all
              git reset --hard origin/main
            else
              git clone https://github.com/titya18/pos_react_front_office.git
            fi

      - name: Build frontend Docker image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            docker compose -f /var/www/docker-compose.frontend.yml build frontend

      - name: Start frontend container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            docker compose -f /var/www/docker-compose.frontend.yml up -d --no-deps frontend
